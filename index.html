<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Transport Solutions | Full Enterprise Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDOPkYduNBvti4HWX2izIhCrrQ02uk5SL0&libraries=geometry,places"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        :root { --frost-red: #c32026; --frost-dark-navy: #0f172a; }

        /* Sidebar Styles */
        .sidebar-item { transition: all 0.2s ease; cursor: pointer; display: flex; align-items: center; width: 100%; border-left: 4px solid transparent; }
        .sidebar-item:hover { background-color: #1e293b; color: white; }
        .active-module { background-color: #1e293b; border-left-color: #3b82f6; color: white; }
        
        .submenu-item { cursor: pointer; display: block; padding: 8px 16px 8px 52px; font-size: 11px; transition: all 0.2s; color: #94a3b8; font-weight: 500; }
        .submenu-item:hover { background-color: #1e293b; color: white; border-left: 2px solid var(--frost-red); }
        
        /* Layout Fixes */
        #map { width: 100%; height: calc(100vh - 280px); min-height: 500px; border-radius: 12px; }
        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .client-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 1.25rem; border-left: 4px solid #334155; transition: 0.2s; }
        
        .hidden { display: none; }
        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-950 flex h-screen overflow-hidden text-slate-100">

    <aside class="w-64 bg-[#0f172a] text-slate-300 flex flex-col flex-shrink-0 border-r border-slate-800">
        <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
            <div class="bg-red-600 p-2 rounded-lg"><i class="fas fa-truck-fast text-white"></i></div>
            <h1 class="text-white text-sm font-black uppercase tracking-widest">Frost Portal</h1>
        </div>

        <nav class="flex-1 py-4 overflow-y-auto scrollbar-hide">
            
            <div onclick="showModule('welcome')" class="sidebar-item px-6 py-3 text-xs font-bold mb-1 active-module" id="nav-welcome">
                <i class="fas fa-chart-line w-6 text-blue-400"></i> DASHBOARD
            </div>

            <div class="mb-1">
                <button onclick="toggleSubmenu('tms-menu', 'tms-arrow')" class="sidebar-item px-6 py-3 text-xs font-bold justify-between outline-none w-full">
                    <div class="flex items-center"><i class="fas fa-file-invoice w-6 text-orange-400"></i> TMS</div>
                    <i id="tms-arrow" class="fas fa-chevron-down text-[10px] transition-transform"></i>
                </button>
                <div id="tms-menu" class="bg-[#0a0f1d] py-1 hidden">
                    <div onclick="showModule('welcome')" class="submenu-item">Live Load Board</div>
                    <div onclick="showModule('welcome')" class="submenu-item">Job Entry</div>
                    <div onclick="showModule('welcome')" class="submenu-item">Invoicing</div>
                </div>
            </div>

            <div class="mb-1">
                <button onclick="toggleSubmenu('crm-menu', 'crm-arrow')" class="sidebar-item px-6 py-3 text-xs font-bold justify-between outline-none w-full">
                    <div class="flex items-center"><i class="fas fa-users w-6 text-teal-400"></i> CRM</div>
                    <i id="crm-arrow" class="fas fa-chevron-down text-[10px] transition-transform"></i>
                </button>
                <div id="crm-menu" class="bg-[#0a0f1d] py-1 hidden">
                    <div onclick="showModule('clients')" class="submenu-item">Customer Database</div>
                    <div onclick="openExternal('https://rich01623.github.io/fts-directory/')" class="submenu-item">Directory</div>
                </div>
            </div>

            <div class="mb-1">
                <button onclick="toggleSubmenu('pf-menu', 'pf-arrow')" class="sidebar-item px-6 py-3 text-xs font-bold justify-between outline-none w-full">
                    <div class="flex items-center"><i class="fas fa-box-open w-6 text-red-500"></i> PALLETFORCE</div>
                    <i id="pf-arrow" class="fas fa-chevron-down text-[10px] transition-transform"></i>
                </button>
                <div id="pf-menu" class="bg-[#0a0f1d] py-1 hidden">
                    <div onclick="showModule('planner')" class="submenu-item">PF Route Planner</div>
                    <div onclick="showModule('welcome')" class="submenu-item">Hub Manifests</div>
                </div>
            </div>

            <div class="mb-1">
                <button onclick="toggleSubmenu('dr-menu', 'dr-arrow')" class="sidebar-item px-6 py-3 text-xs font-bold justify-between outline-none w-full">
                    <div class="flex items-center"><i class="fas fa-id-card w-6 text-purple-400"></i> DRIVERS</div>
                    <i id="dr-arrow" class="fas fa-chevron-down text-[10px] transition-transform"></i>
                </button>
                <div id="dr-menu" class="bg-[#0a0f1d] py-1 hidden">
                    <div onclick="openExternal('https://rich01623.github.io/Fleet-dash/')" class="submenu-item">Timesheets</div>
                    <div onclick="showModule('welcome')" class="submenu-item">Compliance</div>
                </div>
            </div>

            <div class="mb-1">
                <button onclick="toggleSubmenu('acc-menu', 'acc-arrow')" class="sidebar-item px-4 py-3 text-xs font-bold justify-between outline-none w-full pl-6">
                    <div class="flex items-center"><i class="fas fa-vault w-6 text-green-400"></i> ACCOUNTING</div>
                    <i id="acc-arrow" class="fas fa-chevron-down text-[10px] transition-transform"></i>
                </button>
                <div id="acc-menu" class="bg-[#0a0f1d] py-1 hidden">
                    <div class="submenu-item">Sales Ledger</div>
                    <div class="submenu-item">Purchase Ledger</div>
                </div>
            </div>

            <div class="mb-1">
                <button onclick="toggleSubmenu('fl-menu', 'fl-arrow')" class="sidebar-item px-4 py-3 text-xs font-bold justify-between outline-none w-full pl-6">
                    <div class="flex items-center"><i class="fas fa-gas-pump w-6 text-yellow-500"></i> FLEET OPS</div>
                    <i id="fl-arrow" class="fas fa-chevron-down text-[10px] transition-transform"></i>
                </button>
                <div id="fl-menu" class="bg-[#0a0f1d] py-1 hidden">
                    <div class="submenu-item">Vehicle Maintenance</div>
                    <div class="submenu-item">Fuel Tracking</div>
                </div>
            </div>

            <div class="mb-1">
                <div onclick="showModule('welcome')" class="sidebar-item px-6 py-3 text-xs font-bold">
                    <i class="fas fa-microchip w-6 text-pink-500"></i> ANALYTICS
                </div>
            </div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-8">
            <span id="header-title" class="text-[11px] font-black uppercase tracking-widest text-slate-500">System Ready</span>
            <div class="flex items-center space-x-4">
                <button onclick="document.documentElement.classList.toggle('dark')" class="text-slate-500 hover:text-white transition"><i class="fas fa-adjust"></i></button>
                <div class="h-8 w-8 rounded bg-blue-600 flex items-center justify-center text-white text-xs font-black">SJ</div>
            </div>
        </header>

        <main class="flex-1 overflow-auto p-8">
            <div id="mod-welcome" class="h-full flex flex-col items-center justify-center text-slate-700">
                <i class="fas fa-cube text-6xl mb-4 opacity-10"></i>
                <p class="uppercase tracking-widest font-black text-xs">Frost Operations Suite</p>
            </div>

            <div id="mod-iframe" class="hidden h-full">
                <iframe id="external-frame" src="" class="w-full h-full rounded-xl border border-slate-800 shadow-2xl"></iframe>
            </div>

            <div id="mod-clients" class="hidden">
                <div class="flex justify-between mb-8">
                    <h2 class="text-2xl font-black italic uppercase text-white">Customer Database</h2>
                    <div class="flex space-x-2">
                        <input type="text" id="clientSearch" onkeyup="filterClients()" placeholder="Filter..." class="bg-[#0f172a] border border-slate-700 text-xs px-4 py-2 rounded outline-none focus:ring-1 focus:ring-red-500 w-64">
                    </div>
                </div>
                <div id="client-container" class="client-grid"></div>
            </div>

            <div id="mod-planner" class="hidden">
                <div class="grid grid-cols-4 gap-6">
                    <div class="col-span-1 bg-slate-900 p-4 rounded-xl border border-slate-800">
                        <div id="stopList" class="min-h-[300px]"></div>
                        <button onclick="calculateRoute()" class="w-full bg-blue-600 py-3 rounded text-xs font-black uppercase mt-4">Generate Route</button>
                    </div>
                    <div class="col-span-3">
                        <div id="map" class="border-2 border-slate-800"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Supabase
        const SUPABASE_URL = 'https://tdrzytgiqvdulityqttr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcnp5dGdpcXZkdWxpdHlxdHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5NTMsImV4cCI6MjA4ODcyOTk1M30.XN46i7u6STD-2afmN7-Jh1MltADGpEuWlLt_n7wknbA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allClients = [];
        let map, directionsService, directionsRenderer;

        function showModule(id) {
            ['mod-welcome', 'mod-iframe', 'mod-clients', 'mod-planner'].forEach(m => document.getElementById(m).classList.add('hidden'));
            document.getElementById('mod-' + id).classList.remove('hidden');
            document.getElementById('header-title').innerText = id.toUpperCase();
            if(id === 'clients') fetchClients();
            if(id === 'planner') initMap();
        }

        function openExternal(url) {
            showModule('iframe');
            document.getElementById('external-frame').src = url;
        }

        function toggleSubmenu(id, arrowId) {
            document.getElementById(id).classList.toggle('hidden');
            document.getElementById(arrowId).classList.toggle('rotate-180');
        }

        async function fetchClients() {
            const { data } = await _supabase.from('crm_customer').select('*').order('coname');
            allClients = data;
            renderClients(data);
        }

        function renderClients(data) {
            const container = document.getElementById('client-container');
            container.innerHTML = data.map(c => `
                <div class="client-card">
                    <h4 class="text-white font-bold text-xs uppercase mb-2">${c.coname || 'N/A'}</h4>
                    <p class="text-[10px] text-slate-500">${c.town}, ${c.pcode}</p>
                </div>
            `).join('');
        }

        function initMap() {
            if(map) return;
            map = new google.maps.Map(document.getElementById('map'), { center: {lat: 52.4, lng: -1.5}, zoom: 7 });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({map});
        }
    </script>
</body>
</html>
